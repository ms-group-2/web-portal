<h2 mat-dialog-title class="text-xl font-bold text-textBlue">{{ data.title }}</h2>

<mat-dialog-content class="py-4">
  <p class="text-gray-700">{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end" class="gap-2">
  <button
    mat-button
    (click)="onCancel()"
    class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-all"
  >
    {{ data.cancelText || 'გაუქმება' }}
  </button>
  <button
    mat-raised-button
    [color]="data.confirmColor || 'warn'"
    (click)="onConfirm()"
    class="px-4 py-2 rounded-lg transition-all"
  >
    {{ data.confirmText || 'დიახ' }}
  </button>
</mat-dialog-actions>
