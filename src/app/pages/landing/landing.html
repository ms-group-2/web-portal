  <app-header></app-header>
  <div class="landing-container">
    <div class="landing-content">
      <div class="logo-container">
        <img src="/assets/logo/logo-purple.svg" alt="Vipo Logo" class="logo">
      </div>

      <div class="animated-text-container">
        @for (item of displayedText; track $index) {
          <span
            class="animated-char"
            [class.vipo-text]="item.isVipo">
            {{ item.char }}
          </span>
        }
      </div>
    </div>

    
  </div>
  <app-footer></app-footer>
