<div class="space-y-3">
  @for (control of formArray().controls; track $index) {
    <div class="flex gap-3">
      <input
        [type]="inputType()"
        [formControl]="$any(control)"
        [placeholder]="placeholder()"
        class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-primary transition-all"
        [class.font-mono]="inputType() === 'number'"
      />
      @if (showRemoveButton() && formArray().length > 1) {
        <button
          type="button"
          (click)="handleRemove($index)"
          class="w-12 h-12 flex items-center justify-center text-red-600 hover:bg-red-50 rounded-lg transition-all"
        >
          <i [class]="removeButtonIcon() + ' text-xl'"></i>
        </button>
      }
    </div>
  }

  <button
    type="button"
    (click)="handleAdd()"
    class="flex items-center gap-2 text-sm font-semibold text-primary hover:text-primary/80 transition-all"
  >
    <i [class]="addButtonIcon() + ' text-lg'"></i>
    {{ addButtonText() }}
  </button>
</div>
