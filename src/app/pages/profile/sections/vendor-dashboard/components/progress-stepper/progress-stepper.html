<div class="mb-12">
  <div class="flex items-center justify-between max-w-2xl mx-auto">
    @for (stepItem of steps(); track stepItem.step; let isLast = $last; let idx = $index) {
      <div class="flex flex-col items-center relative flex-1">
        <div
          [class]="'w-12 h-12 rounded-full flex items-center justify-center font-black transition-all ' +
                   (currentStep() >= stepItem.step ? 'bg-registerBusiness text-white shadow-lg' : 'bg-gray-200 text-gray-400')"
        >
          @if (currentStep() > stepItem.step) {
            <mat-icon class="w-6 h-6">check</mat-icon>
          } @else {
            {{ stepItem.step }}
          }
        </div>
        <span
          [class]="'text-xs font-bold mt-2 uppercase tracking-wide ' +
                   (currentStep() >= stepItem.step ? 'text-registerBusiness' : 'text-gray-400')"
        >
          {{ stepItem.label | translate }}
        </span>
      </div>

      @if (!isLast) {
        <div class="flex-1 h-1 mx-4 -mt-6 relative">
          <div class="absolute top-0 left-0 right-0 h-full bg-gray-200 rounded-full"></div>
          <div
            [class]="'absolute top-0 left-0 h-full rounded-full transition-all duration-500 ' +
                     (currentStep() > stepItem.step ? 'w-full bg-registerBusiness' : 'w-0 bg-registerBusiness')"
          ></div>
        </div>
      }
    }
  </div>
</div>
