<section class="py-6 bg-white sticky z-40 border-y border-gray-200 shadow-sm [top:var(--app-header-height)]">
  <div class="flex items-center gap-4 overflow-x-auto px-4 sm:px-6 md:px-12 lg:px-20 2xl:px-32">
      @for (category of categories; track category.nameKey) {
        <button
          (click)="selectCategory(category.nameKey)"
          [class]="'flex items-center gap-3 px-6 py-3.5 rounded-xl font-black text-sm uppercase tracking-wide transition-all whitespace-nowrap ' +
            (selectedCategory() === category.nameKey
              ? 'bg-gradient-to-r from-booking to-booking-light text-white shadow-lg scale-105'
              : 'bg-gray-50 text-gray-700 hover:bg-gray-100')"
        >
          <mat-icon class="text-xl">{{ category.icon }}</mat-icon>
          {{ category.nameKey | translate }}
        </button>
      }
    </div>
</section>
