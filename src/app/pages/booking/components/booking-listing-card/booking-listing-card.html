<div appTilt class="group text-left cursor-pointer bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition-shadow">
  <div class="relative aspect-[4/3] overflow-hidden">
    <img
      [src]="listing().images[0]"
      [alt]="listing().title"
      class="size-full object-cover group-hover:scale-105 transition-transform duration-500"
    />
    @if (listing().verified) {
      <div class="absolute top-4 right-4 w-9 h-9 bg-white rounded-full flex items-center justify-center shadow-lg">
        <mat-icon class="text-booking" style="font-size: 20px; width: 20px; height: 20px; line-height: 20px;">verified_user</mat-icon>
      </div>
    }
    @if (listing().instantBook) {
      <div class="absolute top-4 left-4 px-3 py-1.5 bg-booking text-white rounded-full text-xs font-black uppercase tracking-wide flex items-center gap-1">
        <mat-icon class="text-sm">bolt</mat-icon>
        Instant
      </div>
    }
    <button
      (click)="onFavoriteClick($event)"
      [class]="'absolute bottom-4 right-4 w-10 h-10 rounded-full flex items-center justify-center transition-all shadow-lg ' +
        (isFavorite() ? 'bg-booking text-white' : 'bg-white/95 text-gray-900 hover:bg-white')"
    >
      <mat-icon style="font-size: 20px; width: 20px; height: 20px; line-height: 20px;">{{ isFavorite() ? 'favorite' : 'favorite_border' }}</mat-icon>
    </button>
  </div>

  <div class="p-5">
    <div class="flex items-start justify-between mb-2">
      <h3 class="font-black text-gray-900 text-base uppercase tracking-wide group-hover:text-booking transition-colors line-clamp-1 flex-1">
        {{ listing().location.split(',')[0] }}
      </h3>
      <div class="flex items-center gap-1 ml-2 bg-gray-900 text-white px-2 py-1 rounded-lg">
        <mat-icon class="text-sm">star</mat-icon>
        <span class="text-sm font-black">{{ listing().rating }}</span>
      </div>
    </div>

    <p class="text-sm text-gray-500 mb-2 font-semibold">{{ listing().distance }}</p>
    <p class="text-sm text-gray-700 mb-3 line-clamp-1 font-semibold">{{ listing().title }}</p>

    <div class="flex items-center justify-between pt-3 border-t border-gray-100">
      <div class="flex items-baseline gap-1">
        <span class="text-2xl font-black text-booking">${{ listing().price }}</span>
        <span class="text-sm text-gray-500 font-bold">/ {{ listing().priceUnit }}</span>
      </div>
      <span class="text-xs text-gray-500 font-semibold">{{ listing().reviewCount }} reviews</span>
    </div>
  </div>
</div>
