<app-header variant="white"></app-header>

<div class="min-h-screen bg-white">
  <div class="px-4 sm:px-6 md:px-12 lg:px-20 2xl:px-32">
    <app-booking-hero (search)="onSearch($event)" />

    <app-booking-trending />
  </div>

  <app-booking-category-bar [(selectedCategory)]="selectedCategory" />

  <div class="px-4 sm:px-6 md:px-12 lg:px-20 2xl:px-32">
    <app-booking-listings-grid [selectedCategory]="selectedCategory()" />

    <app-booking-featured-hosts />

    <app-booking-reviews />

    <app-booking-features />

    <app-booking-host-cta />
  </div>
</div>

<button
  type="button"
  class="fixed bottom-9 right-9 z-50 flex h-14 w-14 items-center justify-center rounded-full bg-booking-light text-white shadow-lg transition hover:scale-105 hover:shadow-xl"
  [attr.aria-label]="'booking.chat.ariaLabel' | translate"
  (click)="openSupportChat()"
>
  <mat-icon class="!text-3xl !h-10 !w-10">chat</mat-icon>
</button>

<app-footer></app-footer>
