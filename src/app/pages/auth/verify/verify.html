<div class="min-h-screen bg-white flex justify-center pt-20 relative overflow-hidden">
  <a
    routerLink="/auth/register"
    class="absolute top-8 left-8 flex items-center gap-2 text-gray-600"
  >
    <mat-icon>arrow_back</mat-icon>
    <span class="font-bold uppercase text-sm">{{ 'auth.back' | translate }}</span>
  </a>

  <button
    (click)="toggleLanguage()"
    class="absolute top-8 right-8 w-12 h-12 rounded-full flex items-center justify-center font-semibold text-sm transition bg-gray-100 hover:bg-gray-200 text-gray-700"
    [attr.aria-label]="isGeorgian() ? 'Switch to English' : 'Switch to Georgian'"
  >
    {{ isGeorgian() ? 'EN' : 'KA' }}
  </button>

  <div class="w-full max-w-lg">
    <div class="text-center mb-10">
      <div class="flex justify-center mb-2">
        <img
          src="/assets/logo/logo-purple.svg"
          alt="Vipo logo"
          class="h-10 w-auto m-3 mt-5"
        />
      </div>
      <p class="text-sm text-gray-500 font-bold uppercase tracking-wide">
        {{ 'auth.verify.title' | translate }}
      </p>
    </div>

    <div class="bg-white border rounded-2xl p-8 auth-card-shadow">
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-3">
        <div>
          <label class="block text-xs font-black uppercase tracking-wider mb-2">{{ 'auth.email' | translate }}</label>
          <mat-form-field appearance="outline" class="w-full">
            <mat-icon matPrefix>mail</mat-icon>
            <input matInput formControlName="email" />
          </mat-form-field>
        </div>

       <div>
        <label class="block text-xs font-black uppercase tracking-wider mb-2">{{ 'auth.verify.verificationCode' | translate }}</label>

        <div class="flex items-center justify-between gap-4 my-4">
          <div class="flex gap-3">
            @for (digit of codeArray; track $index) {
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                 class="w-12 h-12 text-lg font-bold rounded-xl text-center shadow-sm
                      border border-gray-300 focus:outline-none focus:border-primary"
                [formControl]="digit"
                (input)="onDigitInput($index, $event)"
              />
            }
          </div>

          <button
            type="button"
            class="text-xs font-bold uppercase transition-colors flex flex-col items-center"
            [ngClass]="{
                  'text-primary hover:opacity-80': canResend,
                  'text-gray-400 cursor-not-allowed': !canResend,
                }"
            [disabled]="!canResend"
            (click)="resend()"
          >
            <span class="whitespace-nowrap">{{ 'auth.verify.resendCode' | translate }}</span>
            @if (resendCountdown() > 0) {
              <span class="text-xs font-bold text-gray-500">({{ formattedCountdown }})</span>
            }
          </button>
        </div>

        @if (showError('code')) {
          <p class="text-xs text-red-500 text-center mt-2">
            {{ getError('code') | translate }}
          </p>
        }

        @if (resentMessage()) {
          <p class="text-xs text-green-600 font-semibold text-center mt-2">
            {{ resentMessage() }}
          </p>
        }
      </div>

        <div [hidden]="!serverDownError()" class="text-red-600 text-sm text-center pb-1">
          {{ 'validation.serverDown' | translate }}
        </div>

       <button mat-flat-button type="submit" class="w-full" [disabled]="form.invalid">
          {{ 'auth.verify.submitButton' | translate }}
        </button>
      </form>
    </div>
  </div>
</div>
