<app-header variant="white"></app-header>

<div class="min-h-screen bg-white [overflow-x:clip]">
  <app-swap-hero (search)="onSearch($event)" (postItem)="onPostItem()"></app-swap-hero>

  <app-swap-live-bar [liveActivities]="liveActivities" [onlineUsers]="onlineUsers()"></app-swap-live-bar>

  <div class="px-4 sm:px-6 md:px-12 lg:px-20 2xl:px-32">
    <app-swap-trending [items]="newlyAddedItems()"></app-swap-trending>

    <app-swap-ai-match [aiMatches]="aiMatches"></app-swap-ai-match>
  </div>

  <app-swap-category-bar [(selectedCategoryId)]="selectedCategoryId"></app-swap-category-bar>

  <div class="px-4 sm:px-6 md:px-12 lg:px-20 2xl:px-32">
    <app-swap-listings-grid
      [items]="filteredItems()"
      [isLoading]="isLoading()"
      (postItem)="onPostItem()"
    ></app-swap-listings-grid>

    <app-swap-recent-trades [recentTrades]="recentTrades"></app-swap-recent-trades>
  </div>
</div>

<app-footer></app-footer>
