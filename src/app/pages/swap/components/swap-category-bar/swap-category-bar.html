<section class="py-5 bg-white sticky z-30 border-y border-gray-200 shadow-sm [top:calc(var(--app-header-height)+var(--swap-live-bar-height))]">
  <div class="flex items-center gap-3 overflow-x-auto px-4 sm:px-6 md:px-12 lg:px-20 2xl:px-32 scrollbar-hide">
    <!-- "All" button -->
    <button
      (click)="selectCategory(null)"
      class="flex items-center gap-3 px-6 py-3.5 rounded-xl font-black text-sm uppercase tracking-wide transition-all whitespace-nowrap"
      [ngClass]="selectedCategoryId() === null ? 'bg-swap text-white shadow-lg scale-105' : 'bg-gray-50 text-gray-700 hover:bg-gray-100'">
      <mat-icon class="text-xl">swap_horiz</mat-icon>
      {{ 'swap.categoryBar.all' | translate }}
    </button>

    @for (category of categories(); track category.id) {
      <button
        (click)="selectCategory(+category.id)"
        class="flex items-center gap-3 px-6 py-3.5 rounded-xl font-black text-sm uppercase tracking-wide transition-all whitespace-nowrap"
        [ngClass]="selectedCategoryId() === +category.id ? 'bg-swap text-white shadow-lg scale-105' : 'bg-gray-50 text-gray-700 hover:bg-gray-100'">
        <mat-icon class="text-xl">{{ getCategoryIcon(category) }}</mat-icon>
        {{ category.name }}
      </button>
    }
  </div>
</section>
