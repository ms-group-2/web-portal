<section class="py-16 bg-white" appScrollAnimate="fade-up">
  <div>
    <div class="gradient-border rounded-2xl p-10">
      <div class="flex items-start justify-between mb-10">
        <div class="flex items-center gap-4">
          <div class="w-16 h-16 bg-swap rounded-2xl flex items-center justify-center float-animation">
            <mat-icon class="!text-3xl !text-white !inline-flex !items-center !justify-center">auto_awesome</mat-icon>
          </div>
          <div>
            <h2 class="text-4xl font-black text-gray-900 mb-2">{{ 'swap.aiMatch.title' | translate }}</h2>
            <p class="text-gray-600 font-semibold">{{ 'swap.aiMatch.subtitle' | translate }}</p>
          </div>
        </div>
        <button class="px-6 py-3 bg-swap text-white rounded-xl font-black uppercase text-sm tracking-wide hover:shadow-xl transition-all">
          {{ 'swap.aiMatch.seeAll' | translate }}
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        @for (match of aiMatches(); track match.id; let i = $index) {
          <div
            class="bg-gray-50 rounded-2xl overflow-hidden hover:bg-white border-2 border-gray-100 hover:border-swap transition-all hover:shadow-xl cursor-pointer"
            appScrollAnimate="fade-up"
            [delay]="i * 100">
            <div class="relative h-48">
              <img [src]="match.image" [alt]="match.title" class="w-full h-full object-cover" loading="lazy" />
              <div class="absolute top-4 right-4 w-16 h-16 bg-swap rounded-full flex items-center justify-center shadow-xl border-4 border-white">
                <div class="text-center">
                  <p class="text-white font-black text-lg leading-none">{{ match.matchScore }}</p>
                  <!-- <p class="text-white/80 font-bold text-xs uppercase">{{ 'swap.aiMatch.match' | translate }}</p> -->
                </div>
              </div>
            </div>
            <div class="p-6">
              <h3 class="text-xl font-black text-gray-900 mb-3">{{ match.title }}</h3>
              <div class="flex items-center gap-2 text-sm text-gray-600">
                <mat-icon class="!w-4 !h-4 !text-base text-swap !inline-flex !justify-center !items-center">gps_fixed</mat-icon>
                <span class="font-semibold italic">{{ match.reason }}</span>
              </div>
              <button class="w-full mt-5 py-3 bg-swap text-white rounded-xl font-black uppercase text-xs tracking-wide hover:opacity-90 transition-all">
                {{ 'swap.aiMatch.viewDetails' | translate }}
              </button>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
