<!-- Large Hero Banner -->
<div class="mb-6">
  <div class="relative h-64 bg-gradient-to-br from-market to-[#5a70e8] rounded-3xl overflow-hidden group cursor-pointer">
    <div class="absolute inset-0 bg-gradient-to-r from-black/10 to-transparent"></div>
    <img
      src="https://images.unsplash.com/photo-1618478594486-c65b899c4936?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=1200"
      alt="Galaxy Unpacked"
      class="absolute inset-0 w-full h-full object-cover opacity-30 group-hover:opacity-40 transition-opacity"
    />
    <div class="relative z-10 h-full flex flex-col items-center justify-center text-center text-white px-8">
      <h2 class="text-5xl font-black mb-3 drop-shadow-lg">{{ 'shop.promo.heroTitle' | translate }}</h2>
      <p class="text-lg opacity-90 max-w-2xl">{{ 'shop.promo.heroSubtitle' | translate }}</p>
    </div>
  </div>
</div>

<!-- Two Promotional Banners Side by Side -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
  <!-- First Banner - Clean White -->
  <div class="relative h-48 bg-white border border-gray-200 rounded-3xl overflow-hidden group cursor-pointer">
    <img
      src="https://images.unsplash.com/photo-1740803292822-a742c6a4fef0?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600"
      alt="Home Appliances"
      class="absolute right-0 top-0 h-full w-2/5 object-cover opacity-90 group-hover:opacity-100 transition-opacity"
    />
    <div class="relative z-10 h-full flex flex-col justify-center px-8 text-gray-900 max-w-[60%]">
      <h3 class="text-3xl font-black mb-2 leading-tight">{{ 'shop.promo.kitchenTitle' | translate }}</h3>
      <p class="text-sm text-gray-600">{{ 'shop.promo.kitchenSubtitle' | translate }}</p>
    </div>
  </div>

  <!-- Second Banner - Clean White -->
  <div class="relative h-48 bg-white border border-gray-200 rounded-3xl overflow-hidden group cursor-pointer">
    <img
      src="https://images.unsplash.com/photo-1761552349911-d99f39bf70ba?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600"
      alt="Fashion Sale"
      class="absolute right-0 top-0 h-full w-2/5 object-cover opacity-90 group-hover:opacity-100 transition-opacity"
    />
    <div class="relative z-10 h-full flex flex-col justify-center px-8 text-gray-900 max-w-[60%]">
      <h3 class="text-3xl font-black mb-2 leading-tight">{{ 'shop.promo.fashionTitle' | translate }}</h3>
      <p class="text-sm text-gray-600">{{ 'shop.promo.fashionSubtitle' | translate }}</p>
    </div>
  </div>
</div>
