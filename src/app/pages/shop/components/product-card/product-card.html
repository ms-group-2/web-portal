<div
  [class]="compact 
    ? 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg transition-all duration-300 hover:-translate-y-1 group cursor-pointer'
    : 'w-[213px] h-[349px] bg-white rounded-2xl overflow-hidden hover:shadow-xl transition-all duration-300 group cursor-pointer flex flex-col'"
>
  @if (!compact) {
    <div class="relative h-[180px] overflow-hidden bg-white p-4 flex items-center justify-center flex-shrink-0">
      <img
        [src]="product.image"
        [alt]="product.name"
        class="max-w-full max-h-full object-contain group-hover:scale-105 transition-transform duration-500"
      />
      
     

      <div class="absolute top-2 right-2 flex flex-col gap-1.5">
        <button class="w-8 h-8 bg-white rounded-xl flex items-center justify-center shadow-md border border-gray-200 translate-x-10 group-hover:translate-x-0 transition-all duration-700 hover:bg-market hover:border-market">
          <mat-icon class="!w-3.5 !h-3.5 !text-sm text-gray-700 hover:text-white transition-colors">favorite_border</mat-icon>
        </button>
        <button 
          (click)="addToCart($event)"
          class="w-8 h-8 bg-white rounded-xl flex items-center justify-center shadow-md border border-gray-200 translate-x-10 group-hover:translate-x-0 transition-all duration-700 hover:bg-market hover:border-market"
        >
          <mat-icon class="!w-3.5 !h-3.5 !text-sm text-gray-700 hover:text-white transition-colors">shopping_cart</mat-icon>
        </button>
      </div>
    </div>

    <div class="px-4 pb-4 flex flex-col flex-grow">
      <h3 class="text-sm font-semibold text-gray-900 mb-2 line-clamp-2 leading-tight">
        {{ product.name }}
      </h3>

      <div class="flex items-center gap-2 mb-3">
        <div class="text-xl font-black text-gray-900 inline-flex items-baseline gap-0.5">
          {{ product.price.toFixed(2) }}
          <span class="text-base">₾</span>
        </div>
        @if (product.originalPrice) {
          <div class="text-sm font-medium text-gray-400 line-through inline-flex items-baseline gap-0.5">
            {{ product.originalPrice.toFixed(2) }}
            <span class="text-xs">₾</span>
          </div>
        }
      </div>

      <button 
        (click)="addToCart($event)"
        class="w-full py-2.5 bg-market text-white rounded-xl text-sm font-bold hover:bg-[#7a4fd1] transition-all hover:shadow-lg mt-auto"
      >
        Add to Cart
      </button>
    </div>
  } @else {
    <div class="relative h-48 overflow-hidden bg-gray-100">
      <img
        [src]="product.image"
        [alt]="product.name"
        class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
      />
    </div>

    <div class="p-4">
      <h3 class="text-base font-bold text-gray-900 mb-1 group-hover:text-market transition-colors line-clamp-1">
        {{ product.name }}
      </h3>
      <div class="text-lg font-bold text-market">
        ${{ product.price }}
      </div>
      <div class="flex items-center gap-1 mt-1">
        <mat-icon class="!w-3 !h-3 !text-[12px] text-amber-400">star</mat-icon>
        <span class="text-xs font-semibold text-gray-700">{{ product.rating }}</span>
      </div>
    </div>
  }
</div>
