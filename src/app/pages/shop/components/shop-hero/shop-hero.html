<div class="mb-8 bg-white rounded-3xl p-8 border border-gray-200">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h1 class="text-4xl font-bold text-market mb-2">{{ 'shop.hero.title' | translate }}</h1>
      <p class="text-base text-market/70 max-w-3xl">
        {{ 'shop.hero.subtitle' | translate }}
      </p>
    </div>

    <button
      (click)="toggleCart()"
      class="relative w-14 h-14 rounded-2xl bg-gray-50 border border-gray-200 flex items-center justify-center hover:shadow-md transition-all group">
      <mat-icon class="text-market group-hover:text-market transition-colors">shopping_cart</mat-icon>
      @if (cartCount() > 0) {
        <span class="absolute -top-2 -right-2 w-6 h-6 bg-market text-white rounded-full text-xs font-bold flex items-center justify-center">
          {{ cartCount() }}
        </span>
      }
    </button>
  </div>

  <div class="relative max-w-3xl">
    <input
      type="text"
      [placeholder]="'shop.hero.searchPlaceholder' | translate"
      class="w-full px-6 py-4 pr-14 rounded-2xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-market/50 transition-all"
    />
    <button class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 rounded-lg bg-market flex items-center justify-center transition-all hover:shadow-md">
      <mat-icon class="text-white">search</mat-icon>
    </button>
  </div>
</div>
