<div class="bg-white rounded-3xl border border-gray-200 shadow-sm p-5 lg:p-6">
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

    <!-- Price -->
    <div>
      <div class="flex items-center justify-between mb-2">
        <label class="block text-xs font-black uppercase tracking-[0.12em] text-gray-500">
          {{ 'shop.filters.priceRange' | translate }}
        </label>

        <div class="text-xs font-bold text-market">
          ₾{{ minPrice() }} — ₾{{ maxPrice() }}
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-sm font-semibold text-gray-400">₾</span>
            <input
              type="number"
              [value]="minPrice()"
              (change)="onMinPriceChange($event)"
              min="0"
              [max]="maxPriceLimit()"
              placeholder="0"
              class="w-full h-12 rounded-2xl border border-gray-200 bg-gray-50 pl-8 pr-3 text-sm font-semibold text-gray-900 outline-none transition focus:border-market focus:ring-4 focus:ring-market/10"
            />
          </div>

          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-sm font-semibold text-gray-400">₾</span>
            <input
              type="number"
              [value]="maxPrice()"
              (change)="onMaxPriceChange($event)"
              min="0"
              [max]="maxPriceLimit()"
              [placeholder]="maxPriceLimit()"
              class="w-full h-12 rounded-2xl border border-gray-200 bg-gray-50 pl-8 pr-3 text-sm font-semibold text-gray-900 outline-none transition focus:border-market focus:ring-4 focus:ring-market/10"
            />
          </div>
        </div>
    </div>

    <!-- Sort -->
    <div>
      <div class="flex items-center justify-between mb-2">
        <label class="block text-xs font-black uppercase tracking-[0.12em] text-gray-500">
          {{ 'shop.filters.sortBy' | translate }}
        </label>

      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
        @for (option of sortOptions; track option.value) {
          <button
            type="button"
            (click)="setSortBy(option.value)"
            [class]="sortBy() === option.value
              ? 'h-12 rounded-2xl border border-market/20 bg-market text-white px-4 text-sm font-semibold shadow-sm transition'
              : 'h-12 rounded-2xl border border-gray-200 bg-gray-50 hover:bg-white hover:border-gray-300 px-4 text-sm font-semibold text-gray-700 transition'">
            {{ option.label | translate }}
          </button>
        }
      </div>
    </div>

  </div>
</div>
