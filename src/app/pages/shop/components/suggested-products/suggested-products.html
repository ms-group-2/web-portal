<section class="pb-16  sm:px-8 lg:px-8 bg-[#f8f4f0]">
  <div class="container-max py-12">
    <h2 class="text-3xl font-bold text-gray-900 mb-2">{{ 'shop.suggested.title' | translate }}</h2>
    <p class="text-gray-600 mb-8">{{ 'shop.suggested.subtitle' | translate }}</p>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
      @for (product of suggestedProducts(); track product.id) {
        <app-product-card [product]="product" [compact]="true"></app-product-card>
      }
    </div>
  </div>
</section>
