<div class="relative mb-8">
  <h2 class="text-2xl font-bold text-gray-900 mb-4">{{ 'shop.categories.title' | translate }}</h2>

  <div class="flex gap-4 pb-4 px-1">
    <div class="flex-shrink-0 py-1">
      <button
        (click)="openCategoryBrowser()"
        [class]="'category-button rounded-2xl overflow-hidden group ' +
          (selectedCategory() === null
            ? 'shadow-lg selected'
            : 'hover:shadow-md')"
        style="width: 142px; height: 172px;"
      >
        <div class="relative h-44 bg-gradient-to-br from-market to-[#6B7FE8] flex items-center justify-center overflow-hidden rounded-2xl">
          <mat-icon class="!w-12 !h-12 !text-5xl text-white opacity-80">apps</mat-icon>

          <div class="absolute top-0 left-0 right-0 p-2 bg-gradient-to-b from-black/20 to-transparent">
            <div class="inline-block backdrop-blur-sm px-3 py-2 rounded-lg">
              <p class="m-0 font-bold text-white text-sm leading-tight">
                {{ 'shop.categories.browseAll' | translate }}
              </p>
            </div>
          </div>
        </div>
      </button>
    </div>

    <div class="flex-1 min-w-0">
      @if (isLoading()) {
        <div class="flex gap-4 overflow-hidden">
          @for (i of skeletonArray; track $index) {
            <app-category-card-skeleton></app-category-card-skeleton>
          }
        </div>
      } @else {
        <app-swiper styleClass="category-swiper">
          @for (category of categories(); track category.id) {
            <swiper-slide class="py-1" style="width: 142px;">
              <button
                  (click)="selectCategory(category)"
                  class="category-button relative w-full rounded-lg overflow-hidden bg-[#EAEAEA] transition-all hover:bg-[#E0E0E0] flex items-start justify-start pt-6 px-4"
                  style="width: 142px; height: 172px;"
                  [ngClass]="{
                    'shadow-lg selected': selectedCategory() === category.id,
                    'hover:shadow-md': selectedCategory() !== category.id
                  }"
              >
                <span class="text-sm font-normal text-gray-800 max-w-28 break-words line-clamp-2">
                  {{ category.name | translate }}
                </span>

                @if (category.image || category.image_url) {
                  <div class="absolute bottom-0 right-0 w-20 h-20 overflow-hidden rounded-tl-lg">
                    <img
                      [src]="category.image || category.image_url"
                      [alt]="category.name"
                      class="w-full h-full object-contain"
                    />
                  </div>
                } @else {
                  <div class="absolute bottom-0 right-0 w-20 h-20 flex items-center justify-center">
                    <mat-icon class="!w-12 !h-12 !text-5xl text-gray-400">{{ getCategoryIcon(category) }}</mat-icon>
                  </div>
                }
            </button>
            </swiper-slide>
          }
        </app-swiper>
      }
    </div>
  </div>
</div>
