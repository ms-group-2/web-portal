
<mat-dialog-content class=" !pt-10">
  <form [formGroup]="form" class="space-y-2">
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider mb-2">შეიყვანე ახლანდელი პაროლი</label>
      <mat-form-field appearance="outline" class="w-full">
        <mat-icon matPrefix class="text-gray-400 mr-2">lock</mat-icon>
        <input
          matInput
          [type]="showCurrentPassword() ? 'text' : 'password'"
          formControlName="currentPassword"
          placeholder="მიმდინარე პაროლი"
          (input)="onPasswordInput($event, 'currentPassword')"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="toggleCurrentPasswordVisibility()"
          class="text-gray-400 hover:text-primary"
        >
          <mat-icon>{{ showCurrentPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        @if (showError('currentPassword')) {
          <mat-error>{{ getError('currentPassword') }}</mat-error>
        }
      </mat-form-field>
    </div>

    <div>
      <label class="block text-xs font-black uppercase tracking-wider mb-2">ახალი პაროლი</label>
      <mat-form-field appearance="outline" class="w-full">
        <mat-icon matPrefix class="text-gray-400 mr-2">lock</mat-icon>
        <input
          matInput
          [type]="showNewPassword() ? 'text' : 'password'"
          formControlName="newPassword"
          placeholder="ახალი პაროლი"
          (input)="onPasswordInput($event, 'newPassword')"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="toggleNewPasswordVisibility()"
          class="text-gray-400 hover:text-primary"
        >
          <mat-icon>{{ showNewPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        @if (showError('newPassword')) {
          <mat-error>{{ getError('newPassword') }}</mat-error>
        }
      </mat-form-field>
    </div>

    <div>
      <label class="block text-xs font-black uppercase tracking-wider mb-2">გაიმეორე ახალი პაროლი</label>
      <mat-form-field appearance="outline" class="w-full">
        <mat-icon matPrefix class="text-gray-400 mr-2">lock</mat-icon>
        <input
          matInput
          [type]="showConfirmPassword() ? 'text' : 'password'"
          formControlName="confirmPassword"
          placeholder="გაიმეორე ახალი პაროლი"
          (input)="onPasswordInput($event, 'confirmPassword')"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="toggleConfirmPasswordVisibility()"
          class="text-gray-400 hover:text-primary"
        >
          <mat-icon>{{ showConfirmPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        @if (showError('confirmPassword')) {
          <mat-error>{{ getError('confirmPassword') }}</mat-error>
        }
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="gap-2">
  <button
    mat-button
    (click)="onCancel()"
    class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-all"
  >
    გაუქმება
  </button>
  <button
    mat-raised-button
    color="primary"
    (click)="onConfirm()"
    class="px-4 py-2 rounded-lg transition-all"
    [disabled]="form.invalid"
  >
    შენახვა
  </button>
</mat-dialog-actions>
