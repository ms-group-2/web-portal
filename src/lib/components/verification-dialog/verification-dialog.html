<mat-dialog-content class="!pt-10">
  <!-- Header with icon -->
  <div class="text-center mb-6">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-green-600 rounded-full mb-4 shadow-lg shadow-green-400/30">
      <mat-icon class="!w-10 !h-10 !text-4xl text-white">verified</mat-icon>
    </div>
    <h2 class="text-2xl font-black text-gray-900 mb-2">{{ 'profile.verification.title' | translate }}</h2>
    <p class="text-gray-600 text-sm leading-relaxed">{{ 'profile.verification.subtitle' | translate }}</p>
  </div>

  <!-- Form -->
  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
    <div>
      <label class="block text-xs font-black uppercase tracking-wider mb-2">{{ 'profile.verification.idNumber' | translate }}</label>
      <mat-form-field appearance="outline" class="w-full">
        <mat-icon matPrefix class="text-gray-400 mr-2">badge</mat-icon>
        <input
          matInput
          formControlName="idNumber"
          type="text"
          maxlength="11"
          class="font-medium"
          [placeholder]="'profile.verification.idPlaceholder' | translate"
        />
        @if (form.controls.idNumber.invalid && form.controls.idNumber.touched) {
          <mat-error class="text-xs">
            {{ 'profile.verification.idError' | translate }}
          </mat-error>
        }
      </mat-form-field>
    </div>

    <div class="flex items-start gap-3 p-4 bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl border border-blue-200">
      <mat-icon class="!w-5 !h-5 !text-xl !leading-none text-blue-600 flex-shrink-0">info</mat-icon>
      <p class="text-sm text-blue-900 leading-relaxed m-0">{{ 'profile.verification.infoText' | translate }}</p>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="gap-2">
  <button
    mat-button
    (click)="close()"
    [disabled]="isSubmitting()"
    class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-all"
  >
    {{ 'profile.verification.cancel' | translate }}
  </button>
  <button
    mat-raised-button
    [disabled]="isSubmitting() || form.invalid"
    (click)="submit()"
    class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition-all"
    [class.opacity-60]="isSubmitting() || form.invalid"
  >
    <div class="flex items-center justify-center gap-2">
      @if (isSubmitting()) {
        <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        <span>{{ 'profile.verification.verifying' | translate }}</span>
      } @else {
        <mat-icon class="!w-5 !h-5 !text-xl !leading-none">check_circle</mat-icon>
        <span>{{ 'profile.verification.verify' | translate }}</span>
      }
    </div>
  </button>
</mat-dialog-actions>
