<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 border-b" [ngClass]="variant() === 'white' ? 'bg-white border-gray-200' : headerGradient() + ' border-transparent'">
  <nav class="w-full flex items-center px-4 sm:px-8 md:px-12 lg:px-20 py-2 md:py-3">

    <a
      routerLink="/"
      class="flex items-center gap-2 shrink-0"
      aria-label="Vipo home"
    >
      <img
        [src]="variant() === 'white' ? 'assets/logo/logo-purple.svg' : 'assets/logo/logo-white.svg'"
        alt="Vipo Logo"
        class="w-24 h-8 sm:w-28 sm:h-9 md:w-32 md:h-10"
      />
    </a>

    <ul class="hidden lg:flex items-center gap-1 ml-4 lg:ml-10 text-sm lg:text-base font-bold uppercase tracking-wider" [ngClass]="variant() === 'white' ? 'text-primary/70' : 'text-white/80'">
      @for (item of navItems(); track item.label) {
        <li>
          <a
            [routerLink]="item.link"
            routerLinkActive="active-nav-link"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link font-extrabold transition px-3 lg:px-6 py-2 inline-block rounded-lg"
          >
            {{ item.label | translate }}
          </a>
        </li>

      }
    </ul>

    <div class="ml-auto flex items-center gap-2 sm:gap-3 md:gap-5">
      @if (!isAuthenticated) {
        <a
          routerLink="/auth/register"
          class="register-btn hidden sm:inline-block !px-3 md:!px-5 !py-1.5 md:!py-2 rounded-xl border-2 text-sm md:text-base transition tracking-wider"
        >
          {{ 'header.register' | translate }}
        </a>

        <a
          routerLink="/auth/sign-in"
          class="btn-shimmer px-3 md:px-5 py-1.5 md:py-2 rounded-xl text-sm md:text-base transition tracking-wider inline-block"
        >
          <span class="relative z-10 text-black font-medium">{{ 'header.signIn' | translate }}</span>
        </a>
      }

      <button
        aria-label="Favorites"
        class="header-btn w-9 h-9 md:w-12 md:h-12 rounded-full flex items-center justify-center transition"
      >
        <mat-icon class="header-icon w-6 h-6 hover:scale-110 duration-300">favorite_border</mat-icon>
      </button>

      <button
        aria-label="Shopping cart"
        class="header-btn w-9 h-9 md:w-12 md:h-12 rounded-full flex items-center justify-center transition"
      >
        <mat-icon class="header-icon w-6 h-6 hover:scale-110 duration-300">shopping_cart</mat-icon>
      </button>

      <button
        (click)="toggleLanguage()"
        class="lang-btn w-9 h-9 md:w-12 md:h-12 rounded-full flex items-center justify-center font-semibold text-xs md:text-sm transition"
        [attr.aria-label]="isGeorgian() ? 'Switch to English' : 'Switch to Georgian'"
      >
        {{ isGeorgian() ? 'EN' : 'KA' }}
      </button>

      <button
        [matMenuTriggerFor]="userMenu"
        aria-label="User menu"
        class="header-btn w-9 h-9 md:w-12 md:h-12 rounded-full flex items-center justify-center transition"
      >
        <i class="header-icon ph ph-user text-2xl hover:scale-110 duration-300"></i>
      </button>

      <mat-menu #userMenu="matMenu" class="user-menu z-[60]">
        <button mat-menu-item class="profile-menu-item right " (click)="navigateToProfile()">
          <mat-icon>person</mat-icon>
          <span>{{ 'header.profile' | translate }}</span>
        </button>
        @if (isAuthenticated) {
          <button mat-menu-item (click)="logout()" class="logout-menu-item">
            <mat-icon>logout</mat-icon>
            <span>{{ 'header.logout' | translate }}</span>
          </button>
        }
      </mat-menu>
    </div>
  </nav>
</header>
